version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: shopsphere-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: shopsphere
    networks:
      - shopsphere-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopsphere-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/shopsphere
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - shopsphere-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopsphere-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - shopsphere-network

volumes:
  mongo_data:

networks:
  shopsphere-network:
    driver: bridge
